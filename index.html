<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>URBLE - Daily Urban Dictionary Game • Guess the Slang</title>
  <meta name="description" content="Play URBLE, the daily Urban Dictionary guessing game. Guess real slang definitions in 5 rounds. New words every day.">
  <meta name="robots" content="noarchive">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="title" id="title-clickable">
        <h1>URBLE</h1>
        <p class="tagline">Guess the Urban Dictionary definition</p>
        <p class="tagline-sub">New words daily</p>
      </div>
      <div class="header-buttons">
        <button id="start-btn" class="primary-btn">Play</button>
        <button id="stats-btn" class="secondary-btn">Stats</button>
      </div>
    </header>

    <main>
      <div id="progress-bar" class="hidden">
        <div id="progress-fill"></div>
      </div>

      <!-- Splash Screen -->
      <section id="splash" class="card">
        <!-- Dynamic content added by JS -->
      </section>

      <!-- Game Round -->
      <section id="round" class="card hidden">
        <div class="round-header">
          <h2 id="word-title"></h2>
        </div>
        <div id="options" class="options-grid"></div>
      </section>

      <!-- Result Screen -->
      <section id="result" class="card hidden">
        <h2 id="result-text"></h2>
        <p id="score-text"></p>
        <!-- Timer will be added here by JS -->
        <div style="display: flex; gap: 12px; margin-top: 20px; justify-content: center;">
          <button id="show-answers" class="secondary-btn">Show Answers</button>
          <button id="share-btn" class="secondary-btn">Share</button>
        </div>
      </section>

      <!-- Stats Modal -->
      <section id="stats-modal" class="modal hidden">
        <div class="modal-header">
          <h2>Your Stats</h2>
          <button id="close-stats">Close</button>
        </div>
        <div id="stats-content"></div>
      </section>
    </main>

    <!-- Copyright Footer -->
    <footer style="text-align:center; margin-top: auto; padding: 30px 10px 20px; color:#64748b; font-size: 0.85rem; line-height: 1.5;">
      © 2026 URBLE. All rights reserved.<br>
      This game, its design, code, and content are protected by copyright law.<br>
      Unauthorized copying, modification, or redistribution is strictly prohibited.
    </footer>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
